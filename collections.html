<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="icon" type="image/png" href="https://slaffkwfwmudvernzjua.supabase.co/storage/v1/object/public/product-images/New%20wallpaper.jpeg"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Collections — Master Cove</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script>
var _sb = null;
(function(){
  try {
    _sb = supabase.createClient(
      "https://slaffkwfwmudvernzjua.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNsYWZma3dmd211ZHZlcm56anVhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMzU4MDksImV4cCI6MjA5MTYxMTgwOX0.BEz8_GNKPTQB90LJBJTZFyJYFF-9ypdfbEsLAfEESqY"
    );
  } catch(e) { console.log('Supabase error:', e); }
})();
</script>
<style>
:root{
  --ink:#1C1A17;--sand:#F5EFE6;--linen:#EDE5D8;
  --walnut:#6B4C35;--oak:#B8895A;--maple:#D4AA7D;
  --slate:#5C5750;--mist:#A8A09A;--border:#DDD5C8;
  --white:#FDFBF8;--green:#4A7A5A;--red:#B5432A;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:'Outfit',sans-serif;background:var(--white);color:var(--ink);font-size:14px;}
a{text-decoration:none;color:inherit;}
button{cursor:pointer;font-family:'Outfit',sans-serif;}

/* HEADER */
header{background:var(--white);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.header-inner{max-width:1380px;margin:0 auto;padding:0 32px;height:68px;display:flex;align-items:center;gap:20px;}
.logo{text-decoration:none;flex-shrink:0;display:flex;align-items:center;}
.logo img{height:44px;object-fit:contain;}
.header-right{display:flex;align-items:center;gap:16px;margin-left:auto;}
.nav-link{font-size:13px;color:var(--slate);transition:color .15s;}
.nav-link:hover{color:var(--ink);}
.cart-btn{background:var(--ink);color:#fff;border:none;padding:9px 16px;border-radius:2px;font-size:12.5px;display:flex;align-items:center;gap:7px;transition:background .15s;}
.cart-btn:hover{background:#2E2A26;}

/* HERO */
.hero{background:linear-gradient(160deg,#1C1A17,#2E2A26);padding:64px 32px;text-align:center;}
.hero-inner{max-width:600px;margin:0 auto;}
.hero-label{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--maple);margin-bottom:16px;font-weight:500;}
.hero h1{font-family:'Playfair Display',serif;font-size:42px;font-weight:400;color:#fff;line-height:1.2;margin-bottom:14px;}
.hero h1 em{color:var(--maple);font-style:italic;}
.hero p{font-size:15px;color:rgba(255,255,255,0.5);font-weight:300;line-height:1.8;}

/* MAIN */
.main{max-width:1380px;margin:0 auto;padding:56px 32px;}

/* COLLECTIONS GRID - when showing all collections */
.collections-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:24px;}
.collection-card{background:var(--white);border:1px solid var(--border);border-radius:6px;overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s;}
.collection-card:hover{transform:translateY(-3px);box-shadow:0 12px 36px rgba(0,0,0,0.1);}
.collection-card-imgs{height:460px;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:2px;background:var(--border);overflow:hidden;}
.collection-card-imgs.one{grid-template-columns:1fr;grid-template-rows:1fr;}
.collection-card-imgs.two{grid-template-columns:1fr 1fr;grid-template-rows:1fr;}
.collection-card-imgs.three .ci:first-child{grid-row:1/-1;}
.ci{background:var(--sand);overflow:hidden;display:flex;align-items:center;justify-content:center;}
.ci img{width:100%;height:100%;object-fit:cover;object-position:center top;}
.collection-card-info{padding:14px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.collection-name{font-family:'Playfair Display',serif;font-size:18px;font-weight:400;margin:0;white-space:nowrap;}
.collection-name em{color:var(--walnut);font-style:italic;}
.collection-meta{font-size:11px;color:var(--mist);display:flex;align-items:center;gap:8px;flex-shrink:0;}
.collection-count{background:var(--linen);padding:2px 8px;border-radius:20px;font-size:11px;color:var(--walnut);font-weight:500;white-space:nowrap;}
.view-collection-btn{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--walnut);font-weight:500;border-bottom:1px solid var(--maple);padding-bottom:1px;transition:opacity .15s;white-space:nowrap;flex-shrink:0;}
.view-collection-btn:hover{opacity:.7;}

/* SINGLE COLLECTION VIEW */
.collection-view{display:none;}
.collection-view.active{display:block;}
.collections-list.hidden{display:none;}

.back-btn{display:inline-flex;align-items:center;gap:8px;font-size:13px;color:var(--mist);margin-bottom:28px;cursor:pointer;transition:color .15s;background:none;border:none;}
.back-btn:hover{color:var(--walnut);}
.collection-header{margin-bottom:36px;padding-bottom:24px;border-bottom:1px solid var(--border);}
.collection-header h2{font-family:'Playfair Display',serif;font-size:36px;font-weight:400;margin-bottom:8px;}
.collection-header h2 em{color:var(--walnut);font-style:italic;}
.collection-header p{font-size:14px;color:var(--mist);font-weight:300;}

/* PRODUCT GRID */
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px;}
.prod-card{border:1px solid var(--border);border-radius:4px;overflow:hidden;background:var(--white);cursor:pointer;transition:transform .2s,box-shadow .2s;}
.prod-card:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(0,0,0,0.08);}
.prod-img{aspect-ratio:4/3;background:var(--sand);position:relative;overflow:hidden;}
.prod-img img{width:100%;height:100%;object-fit:cover;display:block;}
.badge{position:absolute;top:10px;left:10px;padding:3px 9px;border-radius:2px;font-size:10px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;}
.badge-new{background:#EEF5F0;color:var(--green);}
.badge-sale{background:#FBF0EE;color:var(--red);}
.badge-best{background:#FBF4E8;color:var(--walnut);}
.prod-info{padding:14px 16px;}
.prod-name{font-size:14px;font-weight:500;line-height:1.35;margin-bottom:4px;}
.prod-cat{font-size:11px;color:var(--mist);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.06em;}
.prod-stars{font-size:11px;color:#B8895A;margin-bottom:8px;}
.prod-stars span{color:#A8A09A;}
.prod-dims{font-size:12px;color:var(--slate);margin-bottom:10px;font-weight:500;}
.finishes{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap;}
.finish{width:16px;height:16px;border-radius:50%;border:2px solid white;outline:1px solid var(--border);}
.prod-footer{display:flex;align-items:center;justify-content:space-between;}
.price{font-size:15px;font-weight:600;}
.was{font-size:12px;color:var(--mist);text-decoration:line-through;margin-left:6px;}
.unit-tag{font-size:10px;color:var(--green);margin-top:2px;}
.add-btn{background:var(--ink);color:#fff;border:none;padding:8px 14px;border-radius:2px;font-size:11.5px;transition:background .15s;}
.add-btn:hover{background:#2E2A26;}

/* EMPTY STATE */
.empty-state{text-align:center;padding:80px 20px;color:var(--mist);}
.empty-state .ei{font-size:48px;margin-bottom:14px;}
.empty-state h3{font-family:'Playfair Display',serif;font-size:22px;color:var(--ink);margin-bottom:8px;font-weight:400;}
.empty-state p{font-size:13px;font-weight:300;line-height:1.7;}

/* LOADING */
.loading{text-align:center;padding:60px;color:var(--mist);font-size:13px;}

/* FOOTER */
footer{background:var(--ink);color:rgba(255,255,255,0.6);padding:48px 0 24px;margin-top:80px;}
.foot-inner{max-width:1380px;margin:0 auto;padding:0 32px;}
.foot-bottom{display:flex;justify-content:space-between;align-items:center;font-size:11.5px;color:rgba(255,255,255,0.25);padding-top:20px;border-top:1px solid rgba(255,255,255,0.08);}

@keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
.fade-up{animation:fadeUp .3s ease both;}

@media(max-width:600px){
  .header-inner{padding:0 16px;}
  .main{padding:32px 16px;}
  .hero{padding:48px 16px;}
  .hero h1{font-size:30px;}
  .collections-grid{grid-template-columns:1fr;}
  .collection-card-imgs{height:280px;}
  .prod-grid{grid-template-columns:repeat(2,1fr);gap:12px;}
  .logo img{height:36px;}
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="index.html" class="logo">
      <img src="https://slaffkwfwmudvernzjua.supabase.co/storage/v1/object/public/product-images/New%20wallpaper.jpeg" alt="Master Cove"/>
    </a>
    <div class="header-right">
      <a href="index.html" class="nav-link">Shop</a>
      <a href="collections.html" class="nav-link" style="color:var(--walnut);font-weight:500;">Collections</a>
      <a href="about.html" class="nav-link">About</a>
      <button class="cart-btn" onclick="window.location.href='index.html'">
        <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
        Shop Now
      </button>
    </div>
  </div>
</header>

<div class="hero">
  <div class="hero-inner">
    <div class="hero-label">Curated by Master Cove</div>
    <h1>Shop by <em>Collection</em></h1>
    <p>Thoughtfully grouped pieces that work together — designed to help you build a cohesive space.</p>
  </div>
</div>

<div class="main">

  <!-- ALL COLLECTIONS LIST -->
  <div id="collections-list" class="collections-list">
    <div class="loading" id="loading-msg">Loading collections…</div>
    <div class="collections-grid" id="collections-grid"></div>
  </div>

  <!-- SINGLE COLLECTION VIEW -->
  <div id="collection-view" class="collection-view">
    <button class="back-btn" onclick="showAllCollections()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      All Collections
    </button>
    <div class="collection-header">
      <h2 id="collection-title">Collection <em>Name</em></h2>
      <p id="collection-subtitle">0 pieces</p>
    </div>
    <div class="prod-grid" id="collection-products"></div>
  </div>

</div>

<footer>
  <div class="foot-inner">
    <div class="foot-bottom">
      <span>© 2026 Master Cove LLC. All rights reserved.</span>
      <span>mastercovestore@gmail.com · (347) 206-0372</span>
    </div>
  </div>
</footer>

<script>
var allProducts = [];
var CAT = {dresser:'Dresser',sideboard:'Sideboard',tv:'TV Console',sidetable:'Table',nightstand:'Nightstand',shoe:'Shoe Storage',bookcase:'Bookcase',desk:'Desk',other:'Other'};

// Check URL for collection param
var urlParams = new URLSearchParams(window.location.search);
var urlCollection = urlParams.get('collection');

document.addEventListener('DOMContentLoaded', async function(){
  try {
    var res = await _sb.from('products').select('id,name,cat,price,was,img,finishes,dims,badge,collection,collection_cover,tagline').eq('status','active');
    if(res.data && res.data.length){
      allProducts = res.data.map(function(p){
        return {
          id:p.id, name:p.name, cat:p.cat, price:p.price, was:p.was,
          img:p.img, finishes:p.finishes||[], dims:p.dims, badge:p.badge,
          collection:p.collection||'', collectionCover:p.collection_cover||'', tagline:p.tagline||''
        };
      });
    }
  } catch(e){ console.log('Load error:', e); }

  document.getElementById('loading-msg').style.display = 'none';
  console.log('All products:', allProducts.map(function(p){ return {name:p.name, collection:p.collection, collectionCover:p.collectionCover}; }));

  if(urlCollection){
    showCollection(decodeURIComponent(urlCollection));
  } else {
    renderCollections();
  }
});

function getActiveImg(p){
  var f = p.finishes && p.finishes[0];
  if(f && f.photos && f.photos.length) return f.photos[0];
  return p.img || null;
}

function renderCollections(){
  // Group products by collection
  var collections = {};
  allProducts.forEach(function(p){
    if(!p.collection || !p.collection.trim()) return;
    var name = p.collection.trim();
    if(!collections[name]) collections[name] = [];
    collections[name].push(p);
  });

  var keys = Object.keys(collections);
  var grid = document.getElementById('collections-grid');

  if(!keys.length){
    grid.innerHTML = '<div class="empty-state"><div class="ei">🛋️</div><h3>No Collections Yet</h3><p>Collections will appear here once you tag products in your admin panel.</p></div>';
    return;
  }

  grid.innerHTML = '';
  keys.forEach(function(name, i){
    var products = collections[name];
    var coverPhoto = null;
    for(var ci=0; ci<products.length; ci++){
      if(products[ci].collectionCover && products[ci].collectionCover.trim() !== ''){
        coverPhoto = products[ci].collectionCover.trim();
        break;
      }
    }
    var imgClass, imgsHTML;
    if(coverPhoto){
      imgClass = 'one';
      imgsHTML = '<div class="ci"><img src="'+coverPhoto+'" onerror="this.style.display=\'none\'"/></div>';
    } else {
      var imgs = products.slice(0,4).map(function(p){ return getActiveImg(p); }).filter(Boolean);
      var imgCount = Math.min(imgs.length, 4);
      imgClass = imgCount === 1 ? 'one' : imgCount === 2 ? 'two' : imgCount === 3 ? 'three' : '';
      imgsHTML = imgs.slice(0,4).map(function(src){
        return '<div class="ci"><img src="'+src+'" onerror="this.style.display=\'none\'"/></div>';
      }).join('');
    }

    // Style the collection name with italic on last word
    var words = name.split(' ');
    var displayName = words.length > 1
      ? words.slice(0,-1).join(' ') + ' <em>' + words[words.length-1] + '</em>'
      : '<em>' + name + '</em>';

    var card = document.createElement('div');
    card.className = 'collection-card fade-up';
    card.style.animationDelay = (i * 0.08) + 's';
    card.innerHTML =
      '<div class="collection-card-imgs '+imgClass+'">' + imgsHTML + '</div>' +
      '<div class="collection-card-info">' +
        '<div>' +
          '<div class="collection-name">' + displayName + '</div>' +
          '<div class="collection-meta" style="margin-top:4px;">' +
            '<span class="collection-count">' + products.length + ' piece' + (products.length !== 1 ? 's' : '') + '</span>' +
            '<span>' + [...new Set(products.map(function(p){ return CAT[p.cat]||p.cat; }))].join(' · ') + '</span>' +
          '</div>' +
        '</div>' +
        '<div class="view-collection-btn">View →</div>' +
      '</div>';
    card.onclick = function(){ showCollection(name); };
    grid.appendChild(card);
  });
}

function showCollection(name){
  // Hide collections list, show single view
  document.getElementById('collections-list').classList.add('hidden');
  document.getElementById('collection-view').classList.add('active');

  // Update URL
  var newUrl = window.location.pathname + '?collection=' + encodeURIComponent(name);
  window.history.pushState({}, '', newUrl);

  // Set title
  var words = name.split(' ');
  var titleHTML = words.length > 1
    ? words.slice(0,-1).join(' ') + ' <em>' + words[words.length-1] + '</em>'
    : '<em>' + name + '</em>';
  document.getElementById('collection-title').innerHTML = titleHTML;
  document.title = name + ' — Master Cove Collections';

  // Filter products
  var products = allProducts.filter(function(p){ return p.collection && p.collection.trim() === name.trim(); });
  document.getElementById('collection-subtitle').textContent = products.length + ' piece' + (products.length !== 1 ? 's' : '') + ' in this collection';

  // Render products
  var grid = document.getElementById('collection-products');
  if(!products.length){
    grid.innerHTML = '<div class="empty-state"><div class="ei">🪵</div><h3>No Products Found</h3><p>Products tagged with this collection will appear here.</p></div>';
    return;
  }

  grid.innerHTML = '';
  products.forEach(function(p, i){
    var card = document.createElement('div');
    card.className = 'prod-card fade-up';
    card.style.animationDelay = (i * 0.05) + 's';
    card.onclick = function(){ window.location.href = 'product-detail.html?id=' + p.id; };

    var img = getActiveImg(p);
    var ratings = [4.8, 4.9, 5.0, 4.7, 4.9];
    var rating = ratings[Math.floor(Math.abs(p.id||0) % ratings.length)];
    var reviewCounts = [24, 18, 31, 12, 47];
    var reviewCount = reviewCounts[Math.floor(Math.abs(p.id||0) % reviewCounts.length)];
    var dimsText = p.dims ? p.dims.replace(/(\d+\.?\d*)\s*x/gi, '$1" x').replace(/(\d+\.?\d*)\s*$/, '$1"') : '';

    var badgeHTML = p.badge ? '<div class="badge badge-'+p.badge+'">'+(p.badge==='new'?'New':p.badge==='sale'?'Sale':'Best Seller')+'</div>' : '';
    var finishDotsHTML = (p.finishes||[]).slice(0,5).map(function(f){
      return '<div class="finish" style="background:'+(typeof f==='object'?f.color:f)+'" title="'+(typeof f==='object'?f.name||'':'')+'"></div>';
    }).join('');

    card.innerHTML =
      '<div class="prod-img">' +
        (img ? '<img src="'+img+'" alt="'+p.name+'" onerror="this.style.display=\'none\'"/>' : '') +
        badgeHTML +
      '</div>' +
      '<div class="prod-info">' +
        '<div class="prod-name">'+p.name+'</div>' +
        '<div class="prod-cat">'+(CAT[p.cat]||p.cat||'')+'</div>' +
        '<div class="prod-stars">★★★★★ <span>'+rating.toFixed(1)+' ('+reviewCount+')</span></div>' +
        (dimsText ? '<div class="prod-dims">'+dimsText+'</div>' : '') +
        (finishDotsHTML ? '<div class="finishes">'+finishDotsHTML+'</div>' : '') +
        '<div class="prod-footer">' +
          '<div>' +
            '<span class="price">$'+Number(p.price).toLocaleString()+'</span>' +
            (p.was ? '<span class="was">$'+Number(p.was).toLocaleString()+'</span>' : '') +
            '<div class="unit-tag">free shipping</div>' +
          '</div>' +
          '<button class="add-btn" onclick="event.stopPropagation();window.location.href=\'product-detail.html?id='+p.id+'\'">View</button>' +
        '</div>' +
      '</div>';
    grid.appendChild(card);
  });
}

function showAllCollections(){
  document.getElementById('collections-list').classList.remove('hidden');
  document.getElementById('collection-view').classList.remove('active');
  window.history.pushState({}, '', window.location.pathname);
  document.title = 'Collections — Master Cove';
}
</script>
</body>
</html>
