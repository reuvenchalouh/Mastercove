<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<link rel="icon" type="image/png" href="https://slaffkwfwmudvernzjua.supabase.co/storage/v1/object/public/product-images/logo.png"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Track Your Order — Master Cove</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<style>
:root{--ink:#1C1A17;--sand:#F5EFE6;--linen:#EDE5D8;--walnut:#6B4C35;--maple:#D4AA7D;--slate:#5C5750;--mist:#A8A09A;--border:#DDD5C8;--white:#FDFBF8;--green:#4A7A5A;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit',sans-serif;background:#F0EBE3;color:var(--ink);min-height:100vh;display:flex;flex-direction:column;}
header{background:var(--white);border-bottom:1px solid var(--border);padding:0 32px;height:64px;display:flex;align-items:center;justify-content:space-between;}
.logo{display:flex;align-items:center;text-decoration:none;}
.logo img{height:44px;object-fit:contain;}
.back-link{font-size:12.5px;color:var(--mist);text-decoration:none;transition:color .15s;}
.back-link:hover{color:var(--walnut);}
.wrap{flex:1;display:flex;flex-direction:column;align-items:center;padding:48px 24px;}
.search-card{background:var(--white);border:1px solid var(--border);border-radius:6px;padding:40px;max-width:520px;width:100%;margin-bottom:28px;}
.search-card h1{font-family:'Playfair Display',serif;font-size:26px;font-weight:400;margin-bottom:8px;}
.search-card h1 em{color:var(--walnut);font-style:italic;}
.search-card p{font-size:13.5px;color:var(--mist);margin-bottom:24px;font-weight:300;}
.input-wrap{margin-bottom:14px;}
.input-wrap label{display:block;font-size:10.5px;letter-spacing:0.08em;text-transform:uppercase;color:var(--slate);font-weight:500;margin-bottom:6px;}
.input-wrap input{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:2px;font-family:'Outfit',sans-serif;font-size:14px;color:var(--ink);outline:none;transition:border-color .15s;background:var(--white);}
.input-wrap input:focus{border-color:var(--walnut);}
.input-wrap input::placeholder{color:var(--mist);}
.divider-or{text-align:center;position:relative;margin:16px 0;}
.divider-or::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:var(--border);}
.divider-or span{position:relative;background:var(--white);padding:0 12px;font-size:11px;color:var(--mist);letter-spacing:0.06em;text-transform:uppercase;}
.track-btn{width:100%;background:var(--walnut);color:#fff;border:none;padding:13px;border-radius:2px;font-size:14px;font-weight:500;cursor:pointer;font-family:'Outfit',sans-serif;transition:background .2s;margin-top:6px;}
.track-btn:hover{background:#5A3D2A;}
.track-btn:disabled{background:var(--mist);cursor:not-allowed;}
.error-msg{background:#FBF0EE;color:#B5432A;border:1px solid #EDCDC8;border-radius:2px;padding:10px 14px;font-size:13px;margin-top:12px;display:none;}

/* Results */
.result-card{background:var(--white);border:1px solid var(--border);border-radius:6px;overflow:hidden;max-width:520px;width:100%;display:none;}
.result-head{background:var(--sand);padding:16px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
.order-num{background:var(--ink);color:var(--maple);font-size:11px;font-weight:600;padding:4px 10px;border-radius:2px;letter-spacing:0.08em;}
.order-status{font-size:10.5px;font-weight:500;letter-spacing:0.06em;padding:4px 10px;border-radius:20px;text-transform:uppercase;}
.s-new{background:#FEF2EF;color:#B5432A;border:1px solid #EDCDC8;}
.s-ordered{background:#FBF4E8;color:var(--walnut);border:1px solid #E8D4B0;}
.s-shipped{background:#EEF5F0;color:var(--green);border:1px solid #C8E0CE;}
.s-delivered{background:var(--linen);color:var(--slate);border:1px solid var(--border);}

/* Timeline */
.timeline{padding:20px 24px;border-bottom:1px solid var(--border);}
.tl-step{display:flex;gap:14px;margin-bottom:20px;position:relative;}
.tl-step:last-child{margin-bottom:0;}
.tl-left{display:flex;flex-direction:column;align-items:center;width:20px;flex-shrink:0;}
.tl-dot{width:20px;height:20px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:700;}
.tl-dot.done{background:var(--green);}
.tl-dot.active{background:var(--walnut);}
.tl-dot.pending{background:var(--border);}
.tl-line{width:2px;flex:1;min-height:20px;margin-top:4px;}
.tl-line.done{background:var(--green);}
.tl-line.pending{background:var(--border);}
.tl-content{flex:1;padding-top:1px;}
.tl-name{font-size:13.5px;font-weight:600;color:var(--ink);margin-bottom:2px;}
.tl-name.pending{color:var(--mist);font-weight:400;}
.tl-desc{font-size:12px;color:var(--mist);font-weight:300;}
.tl-date{font-size:11px;color:var(--mist);margin-top:3px;}

/* Order info */
.order-info{padding:20px 24px;}
.info-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;}
.info-row:last-child{border-bottom:none;}
.info-row .lbl{color:var(--mist);}
.info-row .val{font-weight:500;color:var(--ink);text-align:right;max-width:60%;}

/* Contact */
.contact-strip{background:var(--sand);padding:14px 24px;text-align:center;border-top:1px solid var(--border);}
.contact-strip p{font-size:12.5px;color:var(--mist);}
.contact-strip a{color:var(--walnut);font-weight:500;text-decoration:none;}

footer{background:var(--ink);color:rgba(255,255,255,0.4);padding:20px 32px;text-align:center;font-size:12px;margin-top:auto;}
footer a{color:var(--maple);text-decoration:none;}

@media(max-width:600px){
  header{padding:0 16px;}
  .wrap{padding:24px 16px;}
  .search-card{padding:24px 16px;}
  .result-head{flex-direction:column;align-items:flex-start;}
}
</style>
</head>
<body>

<header>
  <a href="index.html" class="logo">
    <img src="https://slaffkwfwmudvernzjua.supabase.co/storage/v1/object/public/product-images/logo.png" alt="Master Cove"/>
  </a>
  <a href="index.html" class="back-link">← Back to Shop</a>
</header>

<div class="wrap">

  <div class="search-card">
    <h1>Track Your <em>Order</em></h1>
    <p>Enter your order number or email address to see your current order status.</p>

    <div class="input-wrap">
      <label>Order Number</label>
      <input type="text" id="input-order" placeholder="e.g. MC-0001" oninput="clearError()"/>
    </div>

    <div class="divider-or"><span>or</span></div>

    <div class="input-wrap">
      <label>Email Address</label>
      <input type="email" id="input-email" placeholder="you@email.com" oninput="clearError()"/>
    </div>

    <button class="track-btn" id="track-btn" onclick="trackOrder()">Track My Order</button>
    <div class="error-msg" id="error-msg"></div>
  </div>

  <div class="result-card" id="result-card">
    <div class="result-head">
      <div>
        <div class="order-num" id="res-order-num">MC-0001</div>
        <div style="font-size:12px;color:var(--mist);margin-top:4px;" id="res-date"></div>
      </div>
      <div class="order-status" id="res-status"></div>
    </div>

    <div class="timeline" id="res-timeline"></div>

    <div class="order-info" id="res-info"></div>

    <div class="contact-strip">
      <p>Questions? <a href="mailto:mastercovestore@gmail.com">mastercovestore@gmail.com</a> · <a href="tel:+13472060372">(347) 206-0372</a></p>
    </div>
  </div>

</div>

<footer>
  <a href="index.html">Master Cove</a> · © 2026 Master Cove LLC · Brooklyn, NY
</footer>

<script>
var _sb = null;
try {
  _sb = supabase.createClient(
    "https://slaffkwfwmudvernzjua.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNsYWZma3dmd211ZHZlcm56anVhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwMzU4MDksImV4cCI6MjA5MTYxMTgwOX0.BEz8_GNKPTQB90LJBJTZFyJYFF-9ypdfbEsLAfEESqY"
  );
} catch(e) { console.log('Supabase error:', e); }

var SF = ['new','ordered','shipped','delivered'];
var SL = {new:'Order Received',ordered:'Ordered from Supplier',shipped:'Shipped',delivered:'Delivered'};
var SD = {
  new:'We have received your order and are processing it.',
  ordered:'Your order has been placed with our supplier and is being prepared.',
  shipped:'Your furniture is on its way! White-glove delivery to your door.',
  delivered:'Your order has been delivered. Enjoy your new furniture!'
};
var SC = {new:'s-new',ordered:'s-ordered',shipped:'s-shipped',delivered:'s-delivered'};

function clearError(){ document.getElementById('error-msg').style.display='none'; }
function showError(msg){ var el=document.getElementById('error-msg'); el.textContent=msg; el.style.display='block'; }

async function trackOrder(){
  var orderNum = document.getElementById('input-order').value.trim().toUpperCase();
  var email = document.getElementById('input-email').value.trim().toLowerCase();

  if(!orderNum && !email){ showError('Please enter your order number or email address.'); return; }

  var btn = document.getElementById('track-btn');
  btn.disabled = true;
  btn.textContent = 'Searching...';

  try {
    var query = _sb.from('orders').select('*');
    if(orderNum){
      query = query.ilike('order_number', orderNum);
    } else {
      query = query.ilike('email', email);
    }

    var { data, error } = await query;
    if(error) throw error;

    if(!data || !data.length){
      showError('No order found. Please check your order number or email and try again.');
      btn.disabled=false; btn.textContent='Track My Order';
      return;
    }

    // Show most recent order if multiple
    var o = data.sort(function(a,b){ return b.id - a.id; })[0];
    showResult(o);
  } catch(e) {
    showError('Something went wrong. Please try again.');
    console.log(e);
  }

  btn.disabled=false; btn.textContent='Track My Order';
}

function showResult(o){
  var card = document.getElementById('result-card');
  card.style.display = 'block';
  card.scrollIntoView({behavior:'smooth', block:'start'});

  document.getElementById('res-order-num').textContent = o.order_number;
  document.getElementById('res-date').textContent = 'Placed: ' + o.created_at;

  var statusEl = document.getElementById('res-status');
  statusEl.textContent = SL[o.status] || o.status;
  statusEl.className = 'order-status ' + (SC[o.status]||'s-new');

  // Timeline
  var curIdx = SF.indexOf(o.status);
  var tlHTML = '';
  SF.forEach(function(step, i){
    var isDone = curIdx > i;
    var isActive = curIdx === i;
    var isPending = curIdx < i;
    var ts = o.timestamps && o.timestamps[step] ? o.timestamps[step] : (step==='new' ? o.created_at : null);
    var dotClass = isDone ? 'done' : (isActive ? 'active' : 'pending');
    var nameClass = isPending ? 'pending' : '';
    var lineClass = isDone ? 'done' : 'pending';
    tlHTML += '<div class="tl-step">'
      + '<div class="tl-left">'
      + '<div class="tl-dot ' + dotClass + '">' + (isDone ? '✓' : (i+1)) + '</div>'
      + (i < SF.length-1 ? '<div class="tl-line ' + lineClass + '"></div>' : '')
      + '</div>'
      + '<div class="tl-content">'
      + '<div class="tl-name ' + nameClass + '">' + SL[step] + '</div>'
      + '<div class="tl-desc">' + SD[step] + '</div>'
      + (ts ? '<div class="tl-date">' + ts + '</div>' : '')
      + '</div>'
      + '</div>';
  });
  document.getElementById('res-timeline').innerHTML = tlHTML;

  // Order info
  var infoHTML = '';
  if(o.customer) infoHTML += '<div class="info-row"><span class="lbl">Customer</span><span class="val">' + o.customer + '</span></div>';
  if(o.product) infoHTML += '<div class="info-row"><span class="lbl">Item(s)</span><span class="val">' + o.product + '</span></div>';
  if(o.address) infoHTML += '<div class="info-row"><span class="lbl">Ship To</span><span class="val">' + o.address + '</span></div>';
  if(o.tracking_number) infoHTML += '<div class="info-row"><span class="lbl">Tracking #</span><span class="val"><a href="https://www.google.com/search?q=' + encodeURIComponent(o.tracking_number) + '" target="_blank" style="color:var(--walnut);">' + o.tracking_number + '</a></span></div>';
  document.getElementById('res-info').innerHTML = infoHTML;
}

// Allow Enter key
document.addEventListener('keydown', function(e){
  if(e.key === 'Enter') trackOrder();
});
</script>
</body>
</html>
